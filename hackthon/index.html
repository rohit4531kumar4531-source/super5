<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoTrace — Carbon Footprint Assessor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<!-- Landing Screen -->
<template id="landing-template">
  <div class="app-wrap">
    <nav>
      <div class="logo"><div class="logo-dot"></div> EcoTrace</div>
      <div class="badge">HackHorizon 2K26</div>
    </nav>

    <div class="hero">
      <div class="hero-tag">🌍 Free Carbon Assessment Tool</div>
      <h1>Know Your<br/>Carbon Footprint</h1>
      <p>Answer 13 quick questions about your lifestyle and get your personal CO₂ score with an action plan to reduce it.</p>
      <button class="btn-primary" id="start-btn">Start Assessment →</button>
      <div style="margin-top: 12px;">
        <span style="font-size: 13px; color: var(--muted);">Takes under 5 minutes · No sign-up needed</span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num">5</span>
        <div class="stat-label">Lifestyle modules</div>
      </div>
      <div class="stat-card">
        <span class="stat-num">2.3t</span>
        <div class="stat-label">CO₂ target</div>
      </div>
      <div class="stat-card">
        <span class="stat-num">50+</span>
        <div class="stat-label">Recommendations</div>
      </div>
    </div>
  </div>
</template>

<!-- Quiz Screen -->
<template id="quiz-template">
  <div class="app-wrap">
    <nav>
      <div class="logo"><div class="logo-dot"></div> EcoTrace</div>
      <button class="btn-secondary" id="exit-btn" style="padding: 6px 14px; font-size: 13px;">✕ Exit</button>
    </nav>

    <div class="progress-wrap">
      <div class="progress-info">
        <div class="progress-title" id="question-counter">Question 1 of 13</div>
        <div class="progress-count" id="progress-percent">0% complete</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="module-tabs" id="module-tabs"></div>

    <div class="q-card">
      <div class="q-module-tag" id="question-module">Transport</div>
      <div class="q-text" id="question-text">What is your primary mode of daily transport?</div>
      
      <div class="options-grid" id="options-container"></div>
      
      <div class="slider-wrap" id="slider-container" style="display: none;">
        <div class="slider-label">
          <span style="color: var(--muted);">Adjust below</span>
          <span class="slider-val"><span id="slider-value">60</span> <span style="font-size: 14px; font-weight: 400; color: var(--muted);" id="slider-unit">km/week</span></span>
        </div>
        <input type="range" id="slider-input" min="0" max="500" step="10" value="60" />
        <div style="display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted);">
          <span id="slider-min">0</span>
          <span id="slider-max">500</span>
        </div>
      </div>

      <div class="q-nav">
        <button class="btn-secondary" id="back-btn">← Back</button>
        <button class="btn-primary" id="next-btn">Continue →</button>
      </div>
    </div>

    <div class="tip" style="margin-top: 20px;">
      💡 Your data is processed locally and never stored.
    </div>
  </div>
</template>

<!-- Loading Screen -->
<template id="loading-template">
  <div class="app-wrap">
    <nav>
      <div class="logo"><div class="logo-dot"></div> EcoTrace</div>
    </nav>
    <div class="loading-screen">
      <div class="loading-orb"></div>
      <h2>Crunching the numbers…</h2>
      <p id="loading-msg">Calculating your carbon footprint…</p>
    </div>
  </div>
</template>

<!-- Results Screen -->
<template id="results-template">
  <div class="app-wrap">
    <nav>
      <div class="logo"><div class="logo-dot"></div> EcoTrace</div>
      <button class="btn-secondary" id="retake-btn" style="padding: 6px 14px; font-size: 13px;">Retake →</button>
    </nav>

    <div class="results-wrap">
      <div class="results-header">
        <div class="hero-tag">Your Assessment is Ready</div>
        <h2>Your Carbon Footprint</h2>
        <p>Here's your full environmental impact breakdown and your personalised action plan.</p>
      </div>

      <div class="score-gauge-wrap">
        <svg class="gauge-svg" width="180" height="180" viewBox="0 0 180 180" id="gauge-svg"></svg>
        <div class="gauge-val" id="gauge-val">0 <span class="gauge-unit">kg CO₂e/year</span></div>
        <div class="grade-pill" id="grade-pill">Eco Warrior</div>
      </div>

      <div class="section-title">How you compare</div>
      <div class="benchmarks" id="benchmarks-container"></div>

      <div class="section-title">Breakdown by category</div>
      <div class="category-bars" id="category-bars" style="margin-bottom: 40px;"></div>

      <div class="section-title">Your personalised action plan</div>
      <div class="rec-cards" id="recommendations-container"></div>

      <div class="section-title">Offset your remaining footprint</div>
      <div class="tree-calc">
        <div class="tree-label">Trees needed to neutralise your annual footprint</div>
        <div class="tree-num" id="trees-num">🌳 0</div>
        <div class="tree-label" style="margin-top: 4px;">trees planted today would offset your current emissions</div>
      </div>

      <div class="offsets-grid" id="offsets-container"></div>

      <div style="text-align: center; margin-top: 16px;">
        <p style="color: var(--muted); margin-bottom: 16px; font-size: 14px;">
          Share your score and inspire others to take action 🌿
        </p>
        <div class="share-row" style="justify-content: center;">
          <button class="btn-primary" id="share-btn">📋 Copy Share Card</button>
        </div>
      </div>
    </div>
  </div>
</template>

<script src="app.js"></script>
</body>
</html>
